<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3822;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d150f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="200" r="150" fill="#c9a227" opacity="0.1"/>
  <circle cx="1500" cy="800" r="200" fill="#c9a227" opacity="0.1"/>
  
  <!-- Restaurant imagery - Abstract elegant design -->
  <g opacity="0.3">
    <!-- Wine glass silhouette -->
    <path d="M 300 300 L 350 500 L 400 500 L 450 300 Z" stroke="#c9a227" stroke-width="2" fill="none"/>
    
    <!-- Plate -->
    <circle cx="900" cy="500" r="120" stroke="#c9a227" stroke-width="2" fill="none"/>
    <circle cx="900" cy="500" r="100" stroke="#c9a227" stroke-width="1" fill="none"/>
    
    <!-- Fork -->
    <line x1="1400" y1="300" x2="1400" y2="600" stroke="#c9a227" stroke-width="3"/>
    <line x1="1350" y1="300" x2="1350" y2="350" stroke="#c9a227" stroke-width="2"/>
    <line x1="1400" y1="300" x2="1400" y2="350" stroke="#c9a227" stroke-width="2"/>
    <line x1="1450" y1="300" x2="1450" y2="350" stroke="#c9a227" stroke-width="2"/>
  </g>
  
  <!-- Text overlay -->
  <text x="960" y="540" font-family="'Playfair Display', serif" font-size="72" fill="#c9a227" text-anchor="middle" opacity="0.5">
    Restaurante Paraíso
  </text>
  <text x="960" y="620" font-family="'Inter', sans-serif" font-size="32" fill="#f5f7f5" text-anchor="middle" opacity="0.4">
    Experiencia Gastronómica
  </text>
</svg>